[book]
title = "Media Downloader Documentation"
authors = ["cryals"]
language = "en"
multilingual = false
src = "src"

[build]
build-dir = "book"

[output.html]
default-theme = "light"
preferred-dark-theme = "navy"
git-repository-url = "https://github.com/cryals/qruster"
edit-url-template = "https://github.com/cryals/qruster/edit/main/docs/{path}"

[output.html.fold]
enable = true
level = 0
