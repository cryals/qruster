name: Bug Report
description: Report a bug or issue
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug!

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened
    validations:
      required: true

  - type: input
    id: url
    attributes:
      label: URL (if applicable)
      description: The URL you were trying to download from
      placeholder: https://youtube.com/watch?v=...

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      description: Which platform were you downloading from?
      options:
        - YouTube
        - TikTok
        - Instagram
        - Facebook
        - VK
        - Bilibili
        - Other
    validations:
      required: false

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: e.g., Ubuntu 22.04, macOS 14, Windows 11
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: Media Downloader version
      placeholder: e.g., 0.1.0
    validations:
      required: false

  - type: dropdown
    id: deployment
    attributes:
      label: Deployment Mode
      options:
        - Development
        - Production (Docker)
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Relevant log output
      render: shell

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context about the problem
